<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给妈妈的专属树洞</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff8fa3;
            --glass: rgba(255, 255, 255, 0.25);
            --text: #5a4747;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background: #fff5f7;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* 动态粒子背景画布 */
        #canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            background: linear-gradient(180deg, #fff5f7 0%, #ffe4e9 100%);
        }

        /* 音乐播放器 */
        .music-player {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 1000;
            width: 40px; height: 40px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.5);
            animation: rotate 5s linear infinite;
            animation-play-state: paused;
            cursor: pointer;
        }
        .music-player.playing { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 全屏翻页系统 */
        .swiper {
            height: 100vh; width: 100%;
            position: relative;
        }

        .page {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 30px;
            opacity: 0;
            transform: scale(1.1);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            text-align: center;
        }

        .page.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* 高级感文字效果 */
        h1 { font-family: 'Ma Shan Zheng', cursive; font-size: 3rem; color: var(--accent); margin-bottom: 1rem; }
        .quote { font-size: 1.1rem; line-height: 2; letter-spacing: 1px; color: #7d6666; }
        .highlight { color: var(--accent); font-weight: 600; border-bottom: 2px dashed var(--accent); }

        /* 磨砂玻璃卡片 */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 40px 10px 40px 10px;
            padding: 35px 25px;
            box-shadow: 0 20px 50px rgba(255, 143, 163, 0.15);
            max-width: 90%;
        }

        /* 引导动画 */
        .arrow {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 20px; color: var(--accent);
            animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%,20%,50%,80%,100% {transform:translateX(-50%) translateY(0)} 40% {transform:translateX(-50%) translateY(-10px)} 60% {transform:translateX(-50%) translateY(-5px)} }

        /* SVG 花束样式 */
        .flower-svg { width: 150px; height: 150px; margin-bottom: 20px; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="music-player" id="musicBtn" onclick="toggleMusic()">
    <span style="font-size: 20px;">🎵</span>
    <audio id="bgMusic" loop src="https://api.uomg.com/api/rand.music?sort=热歌榜&format=mp3"></audio>
</div>

<div class="swiper">
    <section class="page active">
        <div class="flower-svg">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 50C70 20 90 40 50 70C10 40 30 20 50 50Z" fill="#ff8fa3" opacity="0.8">
                    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
                </path>
                <circle cx="50" cy="50" r="5" fill="#ffd166" />
                <path d="M50 70V95" stroke="#81b29a" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>致：亲爱的妈妈</h1>
        <p class="quote" style="margin-top: 20px;">跨越千里的快递盒里<br>藏着您最温柔的叮嘱</p>
    </section>

    <section class="page">
        <div class="card">
            <span style="font-size: 50px;">🍐</span>
            <p class="quote">
                在宿舍拆开那箱<span class="highlight">家乡的梨</span>时，<br>
                室友都说味道好甜。<br>
                但我知道，最甜的是您怕我<br>
                在外地照顾不好自己的那颗心。
            </p>
        </div>
    </section>

    <section class="page">
        <div class="card">
            <span style="font-size: 50px;">🥛</span>
            <p class="quote">
                那袋沉甸甸的<span class="highlight">奶粉</span>，<br>
                每天早晨冲一杯，<br>
                热气腾腾的时候，<br>
                就像您坐在我床边催我起床一样。
            </p>
        </div>
    </section>

    <section class="page">
        <div style="font-size: 60px; margin-bottom: 20px;">❤️</div>
        <p class="quote" style="padding: 0 20px;">
            读了大学才发现，<br>
            微信步数的每一次更新，<br>
            和包裹里塞得满满当当的食物，<br>
            是您跨越千山万水，<br>
            <span class="highlight">正在爱着我的证明。</span>
        </p>
    </section>

    <section class="page">
        <h1 style="font-size: 2.5rem;">母亲节快乐</h1>
        <p class="quote">
            愿岁月对您温柔以待，<br>
            不止在今天，而在岁岁年年。
        </p>
        <div style="margin-top: 30px; font-family: 'Ma Shan Zheng'; font-size: 1.5rem; color: var(--accent);">爱您的：孩子</div>
    </section>
</div>

<div class="arrow">向上滑动解锁心意</div>

<script>
    // 1. 音乐控制逻辑
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    function toggleMusic() {
        if (music.paused) {
            music.play();
            btn.classList.add('playing');
        } else {
            music.pause();
            btn.classList.remove('playing');
        }
    }

    // 2. 全屏翻页逻辑
    let cur = 0;
    const pages = document.querySelectorAll('.page');
    let isScrolling = false;

    window.addEventListener('wheel', (e) => {
        if(isScrolling) return;
        if(e.deltaY > 0) go(cur + 1);
        else go(cur - 1);
    });

    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientY - touchY;
        if(Math.abs(diff) < 50) return;
        if(diff < 0) go(cur + 1);
        else go(cur - 1);
    });

    function go(idx) {
        if(idx < 0 || idx >= pages.length) return;
        isScrolling = true;
        pages[cur].classList.remove('active');
        cur = idx;
        pages[cur].classList.add('active');
        setTimeout(() => isScrolling = false, 1000);
        document.querySelector('.arrow').style.opacity = (cur === pages.length - 1) ? '0' : '1';
    }

    // 3. 背景粒子交互效果 (爱心与花瓣)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 20;
            this.size = Math.random() * 15 + 5;
            this.speedY = Math.random() * 1 + 0.5;
            this.speedX = Math.sin(Math.random() * 10) * 0.5;
            this.type = Math.random() > 0.5 ? '❤️' : '🌸';
            this.opacity = Math.random() * 0.5 + 0.2;
        }
        update() {
            this.y -= this.speedY;
            this.x += this.speedX;
            if (this.y < -20) this.reset();
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.font = `${this.size}px Arial`;
            ctx.fillText(this.type, this.x, this.y);
        }
    }

    for(let i=0; i<30; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }
    animate();

    // 提醒：首次点击页面启动音乐
    document.body.addEventListener('click', () => {
        if(music.paused) toggleMusic();
    }, {once: true});
</script>
</body>
</html>
